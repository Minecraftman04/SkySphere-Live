<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Refreshing SkySphere Live…</title>
  <style>
    html,body{height:100%;margin:0;background:#07111f;color:#f4f8ff;font-family:system-ui,sans-serif}body{display:grid;place-items:center;text-align:center;padding:24px}.box{max-width:420px}.spinner{width:36px;height:36px;margin:0 auto 16px;border:4px solid rgba(83,216,255,.18);border-top-color:#53d8ff;border-radius:50%;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}p{color:#a8b8ca}
  </style>
</head>
<body>
  <div class="box"><div class="spinner"></div><h1>Refreshing SkySphere Live</h1><p>Clearing cached site files and loading build 2026.07.07.5…</p></div>
  <script>
    (async () => {
      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }
        if ('caches' in window) {
          const names = await caches.keys();
          await Promise.all(names.map((name) => caches.delete(name)));
        }
      } catch (error) {
        console.warn('Cache cleanup was not fully available', error);
      }
      const url = new URL('./', location.href);
      url.searchParams.set('build', '20260707-5');
      url.searchParams.set('t', Date.now().toString());
      location.replace(url.href);
    })();
  </script>
</body>
</html>
